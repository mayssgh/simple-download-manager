    const tasks = {};

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatSpeed(bytesPerSec) {
      if (bytesPerSec == null || isNaN(bytesPerSec)) return "-";
      const b = Number(bytesPerSec);
      if (b < 1024) return `${b.toFixed(0)} B/s`;
      if (b < 1024 * 1024) return `${(b / 1024).toFixed(1)} KB/s`;
      if (b < 1024 * 1024 * 1024) return `${(b / (1024 * 1024)).toFixed(1)} MB/s`;
      return `${(b / (1024 * 1024 * 1024)).toFixed(1)} GB/s`;
    }

    function formatEta(seconds) {
      if (seconds == null || seconds === "" || isNaN(seconds)) return "-";
      const s = Math.max(0, Number(seconds));
      if (s < 60) return `${Math.round(s)}s`;
      if (s < 3600) return `${Math.floor(s / 60)}m ${Math.round(s % 60)}s`;
      return `${Math.floor(s / 3600)}h ${Math.floor((s % 3600) / 60)}m`;
    }

    function renderTable() {
      const tbody = document.getElementById("downloadsTableBody");
      const rows = Object.values(tasks).map(task => {
        const progress = Number(task.progress ?? 0).toFixed(1);
        const status = String(task.status ?? "unknown").toLowerCase();

        return `
          <tr>
            <td>${escapeHtml(task.id)}</td>
            <td title="${escapeHtml(task.url)}">${escapeHtml(task.url)}</td>
            <td>
              <span class="status-badge status-${escapeHtml(status)}">
                ${escapeHtml(status)}
              </span>
            </td>
            <td>
              <div class="progress-wrap">
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
                <div class="small">${progress}%</div>
              </div>
            </td>
            <td>${escapeHtml(formatSpeed(task.speed))}</td>
            <td>${escapeHtml(formatEta(task.eta))}</td>
            <td>
              <button class="pause" onclick="pauseDownload('${task.id}')">Pause</button>
              <button class="resume" onclick="resumeDownload('${task.id}')">Resume</button>
              <button class="delete" onclick="cancelDownload('${task.id}')">Cancel</button>
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = rows.join("") || `
        <tr>
          <td colspan="7" class="muted">No downloads yet.</td>
        </tr>
      `;
    }

    async function loadDownloads() {
      try {
        const res = await fetch(`${API_BASE}/downloads`);
        const data = await res.json();

        for (const item of data) {
          tasks[item.id] = {
            ...tasks[item.id],
            ...item
          };
        }

        renderTable();
      } catch (err) {
        console.error("Failed to load downloads:", err);
      }
    }

    async function createDownload() {
      const input = document.getElementById("urlInput");
      const url = input.value.trim();

      if (!url) {
        alert("Please enter a URL.");
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/downloads`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Failed to create download");
        }

        const task = await res.json();
        tasks[task.id] = task;
        input.value = "";
        renderTable();
      } catch (err) {
        console.error(err);
        alert(err.message || "Error creating download");
      }
    }

    async function pauseDownload(id) {
      try {
        const res = await fetch(`${API_BASE}/downloads/${id}/pause`, {
          method: "POST"
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Failed to pause");
        }

        const task = await res.json();
        tasks[id] = { ...tasks[id], ...task };
        renderTable();
      } catch (err) {
        console.error(err);
        alert(err.message || "Error pausing download");
      }
    }

    async function resumeDownload(id) {
      try {
        const res = await fetch(`${API_BASE}/downloads/${id}/resume`, {
          method: "POST"
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Failed to resume");
        }

        const task = await res.json();
        tasks[id] = { ...tasks[id], ...task };
        renderTable();
      } catch (err) {
        console.error(err);
        alert(err.message || "Error resuming download");
      }
    }

    async function cancelDownload(id) {
      try {
        const res = await fetch(`${API_BASE}/downloads/${id}`, {
          method: "DELETE"
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Failed to cancel");
        }

        if (tasks[id]) {
          tasks[id].status = "cancelled";
        }
        renderTable();
      } catch (err) {
        console.error(err);
        alert(err.message || "Error cancelling download");
      }
    }

    function connectWebSocket() {
      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        console.log("WebSocket connected");
        ws.send("client-ready");
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (!data.id) return;

          tasks[data.id] = {
            ...tasks[data.id],
            ...data
          };

          renderTable();
        } catch (err) {
          console.error("WS parse error:", err);
        }
      };

      ws.onclose = () => {
        console.warn("WebSocket disconnected. Reconnecting in 2s...");
        setTimeout(connectWebSocket, 2000);
      };

      ws.onerror = (err) => {
        console.error("WebSocket error:", err);
        ws.close();
      };
    }

    loadDownloads();
    connectWebSocket();
  </script>
</body>
