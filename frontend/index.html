<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDM — Simple Download Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080b12;
      --surface:   #0f1420;
      --surface2:  #161c2d;
      --border:    #1e2a40;
      --accent:    #3b82f6;
      --accent2:   #6366f1;
      --success:   #10b981;
      --warning:   #f59e0b;
      --danger:    #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 0;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
      padding: 0 24px 28px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }

    .logo span { color: var(--muted); }

    .nav { padding: 20px 12px; flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.15s;
      margin-bottom: 2px;
      user-select: none;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(59,130,246,0.12); color: var(--accent); }

    .nav-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.6;
    }

    .nav-count {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 99px;
      color: var(--muted);
    }

    .nav-item.active .nav-count { background: rgba(59,130,246,0.2); color: var(--accent); }

    .sidebar-footer {
      padding: 16px 24px 0;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* ── TOPBAR ── */
    .topbar {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }

    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-add:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    .btn-add svg { width: 14px; height: 14px; }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: var(--mono);
    }

    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
    }

    .empty-state svg {
      width: 48px; height: 48px;
      margin: 0 auto 16px;
      opacity: 0.2;
    }

    .empty-state p { font-size: 14px; }

    /* ── DOWNLOAD CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover { border-color: #2a3550; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-url {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    .badge-downloading { background: rgba(59,130,246,0.12); color: var(--accent); }
    .badge-completed   { background: rgba(16,185,129,0.12); color: var(--success); }
    .badge-paused      { background: rgba(245,158,11,0.12); color: var(--warning); }
    .badge-failed      { background: rgba(239,68,68,0.12);  color: var(--danger); }
    .badge-cancelled   { background: rgba(100,116,139,0.12); color: var(--muted); }
    .badge-queued      { background: rgba(99,102,241,0.12); color: var(--accent2); }
    .badge-pending     { background: rgba(99,102,241,0.12); color: var(--accent2); }
    .badge-unknown     { background: rgba(100,116,139,0.12); color: var(--muted); }

    .stat {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .stat span { color: var(--text); }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 12px; }

    .progress-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 5px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.3s ease;
      position: relative;
    }

    .progress-fill.completed { background: var(--success); }
    .progress-fill.failed    { background: var(--danger); }
    .progress-fill.paused    { background: var(--warning); }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 40px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
      animation: shimmer 1.5s infinite;
    }

    .progress-fill.completed::after,
    .progress-fill.failed::after,
    .progress-fill.paused::after { display: none; }

    @keyframes shimmer {
      0% { transform: translateX(-40px); }
      100% { transform: translateX(40px); }
    }

    .progress-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    /* ── ACTIONS ── */
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .btn-icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 12px;
    }

    .btn-icon:hover { background: var(--surface2); color: var(--text); border-color: #2a3550; }
    .btn-icon.danger:hover { background: rgba(239,68,68,0.1); color: var(--danger); border-color: rgba(239,68,68,0.3); }
    .btn-icon.success:hover { background: rgba(16,185,129,0.1); color: var(--success); border-color: rgba(16,185,129,0.3); }
    .btn-icon.warning:hover { background: rgba(245,158,11,0.1); color: var(--warning); border-color: rgba(245,158,11,0.3); }

    .btn-icon svg { width: 13px; height: 13px; }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      animation: toastIn 0.2s ease;
      max-width: 300px;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .toast.error { border-color: rgba(239,68,68,0.3); }
    .toast.success { border-color: rgba(16,185,129,0.3); }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">SDM <span>v1.0</span></div>

  <nav class="nav">
    <div class="nav-item active" onclick="setFilter('all')" id="nav-all">
      <span class="nav-dot"></span> All
      <span class="nav-count" id="count-all">0</span>
    </div>
    <div class="nav-item" onclick="setFilter('downloading')" id="nav-downloading">
      <span class="nav-dot"></span> Active
      <span class="nav-count" id="count-downloading">0</span>
    </div>
    <div class="nav-item" onclick="setFilter('completed')" id="nav-completed">
      <span class="nav-dot"></span> Completed
      <span class="nav-count" id="count-completed">0</span>
    </div>
    <div class="nav-item" onclick="setFilter('paused')" id="nav-paused">
      <span class="nav-dot"></span> Paused
      <span class="nav-count" id="count-paused">0</span>
    </div>
    <div class="nav-item" onclick="setFilter('failed')" id="nav-failed">
      <span class="nav-dot"></span> Failed
      <span class="nav-count" id="count-failed">0</span>
    </div>
  </nav>

  <div class="sidebar-footer">
    <span class="status-dot"></span>Connected
  </div>
</aside>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <input id="urlInput" class="url-input" type="url" placeholder="https://example.com/file.zip" />
    <button class="btn-add" onclick="createDownload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
      Download
    </button>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="section-header">
      <span class="section-title" id="sectionTitle">All Downloads</span>
    </div>

    <div id="downloadsContainer"></div>

    <div id="emptyState" class="empty-state" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
        <path d="M12 2v20M2 12h20"/>
        <circle cx="12" cy="12" r="10"/>
      </svg>
      <p>No downloads here yet.</p>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toastContainer"></div>

<script>
  const API_BASE = "http://127.0.0.1:8000";
  const WS_URL   = "ws://127.0.0.1:8000/ws";

  const tasks = {};
  let currentFilter = "all";

  /* ── UTILS ── */
  function formatSpeed(b) {
    if (!b || isNaN(b)) return "—";
    if (b < 1024) return `${b}B/s`;
    if (b < 1048576) return `${(b/1024).toFixed(1)}KB/s`;
    return `${(b/1048576).toFixed(1)}MB/s`;
  }

  function formatEta(s) {
    if (s == null || isNaN(s)) return "—";
    s = Math.max(0, Number(s));
    if (s < 60) return `${Math.round(s)}s`;
    if (s < 3600) return `${Math.floor(s/60)}m ${Math.round(s%60)}s`;
    return `${Math.floor(s/3600)}h ${Math.floor((s%3600)/60)}m`;
  }

  function esc(v) {
    return String(v ?? "").replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
  }

  function toast(msg, type = "") {
    const el = document.createElement("div");
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById("toastContainer").appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  /* ── COUNTS ── */
  function updateCounts() {
    const all = Object.values(tasks);
    const counts = { all: all.length, downloading: 0, completed: 0, paused: 0, failed: 0 };
    all.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
    Object.entries(counts).forEach(([k, v]) => {
      const el = document.getElementById(`count-${k}`);
      if (el) el.textContent = v;
    });
  }

  /* ── NAV ── */
  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
    document.getElementById(`nav-${f}`)?.classList.add("active");

    const titles = { all: "All Downloads", downloading: "Active Downloads",
      completed: "Completed", paused: "Paused", failed: "Failed" };
    document.getElementById("sectionTitle").textContent = titles[f] || "Downloads";
    render();
  }

  /* ── RENDER ── */
  function render() {
  const container = document.getElementById("downloadsContainer");
  const empty = document.getElementById("emptyState");

  const filtered = Object.values(tasks).filter(t => {
    if (currentFilter === "all") return true;
    return t.status === currentFilter;
  });

  if (!filtered.length) {
    container.innerHTML = "";
    empty.style.display = "block";
    updateCounts();
    return;
  }

  empty.style.display = "none";

  filtered.forEach(t => {
    const p = Number(t.progress || 0).toFixed(1);
    const status = String(t.status || "unknown").toLowerCase();
    const fillClass = ["completed","failed","paused"].includes(status) ? status : "";

    let card = document.getElementById(`card-${t.id}`);

    if (!card) {
      // Create new card only if it doesn't exist
      card = document.createElement("div");
      card.className = "card";
      card.id = `card-${t.id}`;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-info">
            <div class="card-url" title="${esc(t.url)}">${esc(t.url)}</div>
            <div class="card-meta">
              <span class="badge badge-${esc(status)}" id="badge-${t.id}">
                <span class="badge-dot"></span><span id="badge-text-${t.id}">${esc(status)}</span>
              </span>
              <span class="stat">Speed <span id="speed-${t.id}">—</span></span>
              <span class="stat">ETA <span id="eta-${t.id}">—</span></span>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-icon warning" title="Pause" onclick="pauseDownload('${esc(t.id)}')">
              <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button class="btn-icon success" title="Resume" onclick="resumeDownload('${esc(t.id)}')">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
            <button class="btn-icon danger" title="Cancel" onclick="cancelDownload('${esc(t.id)}')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            ${status === 'completed' ? `
                <a href="${API_BASE}/downloads/${esc(t.id)}/file" 
                target="_blank"
                class="btn-icon success" title="Open file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                </a>
            ` : ''}
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill ${fillClass}" id="fill-${t.id}" style="width:${p}%"></div>
          </div>
          <div class="progress-label">
            <span id="pct-${t.id}">${p}%</span>
            <span id="status-label-${t.id}"></span>
          </div>
        </div>
      `;
      container.appendChild(card);
    } else {
      // Just update the changing parts — no flicker!
      const badge = document.getElementById(`badge-${t.id}`);
      if (badge) {
        badge.className = `badge badge-${esc(status)}`;
        document.getElementById(`badge-text-${t.id}`).textContent = status;
      }
      const fill = document.getElementById(`fill-${t.id}`);
      if (fill) {
        fill.style.width = `${p}%`;
        fill.className = `progress-fill ${fillClass}`;
      }
      const pct = document.getElementById(`pct-${t.id}`);
      if (pct) pct.textContent = `${p}%`;

      const statusLabel = document.getElementById(`status-label-${t.id}`);
      if (statusLabel) {
        statusLabel.textContent = status === "completed" ? "Done" : status === "failed" ? "Failed" : "";
      }
      // 🔥 ADD OPEN BUTTON DYNAMICALLY AFTER COMPLETION
    const actions = card.querySelector(".card-actions");
    if (actions) {
    const existing = actions.querySelector(".open-btn");

    if (status === "completed" && !existing) {
        const btn = document.createElement("a");
        btn.href = `${API_BASE}/downloads/${t.id}/file`;
        btn.target = "_blank";
        btn.className = "btn-icon success open-btn";
        btn.title = "Open file";
        btn.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        `;
        actions.appendChild(btn);
    }
}
    }

    // Always update speed and ETA
    const speedEl = document.getElementById(`speed-${t.id}`);
    if (speedEl) speedEl.textContent = formatSpeed(t.speed);
    const etaEl = document.getElementById(`eta-${t.id}`);
    if (etaEl) etaEl.textContent = formatEta(t.eta);
  });

  updateCounts();
}

  /* ── API ── */
  async function loadDownloads() {
    try {
      const res = await fetch(`${API_BASE}/downloads`);
      const data = await res.json();
      data.forEach(t => { tasks[t.id] = { ...tasks[t.id], ...t }; });
      render();
      updateCounts();
    } catch (e) {
      console.error("Failed to load downloads", e);
    }
  }

  async function createDownload() {
    const input = document.getElementById("urlInput");
    const url = input.value.trim();
    if (!url) { toast("Please enter a URL", "error"); return; }

    try {
      const res = await fetch(`${API_BASE}/downloads`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Failed");
      }

      const task = await res.json();
      tasks[task.id] = task;
      input.value = "";
      render();
      toast("Download started", "success");
    } catch (e) {
      toast(e.message || "Error starting download", "error");
    }
  }

  async function pauseDownload(id) {
    try {
      const res = await fetch(`${API_BASE}/downloads/${id}/pause`, { method: "POST" });
      const task = await res.json();
      tasks[id] = { ...tasks[id], ...task };
      render();
    } catch (e) { toast("Failed to pause", "error"); }
  }

  async function resumeDownload(id) {
    try {
      const res = await fetch(`${API_BASE}/downloads/${id}/resume`, { method: "POST" });
      const task = await res.json();
      tasks[id] = { ...tasks[id], ...task };
      render();
    } catch (e) { toast("Failed to resume", "error"); }
  }

  async function cancelDownload(id) {
    try {
      await fetch(`${API_BASE}/downloads/${id}`, { method: "DELETE" });
      if (tasks[id]) tasks[id].status = "cancelled";
      render();
    } catch (e) { toast("Failed to cancel", "error"); }
  }

  /* ── WEBSOCKET ── */
  function connectWebSocket() {
    const ws = new WebSocket(WS_URL);

    ws.onopen = () => ws.send("client-ready");

    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (!data.id) return;
        tasks[data.id] = { ...tasks[data.id], ...data };
        render();
      } catch {}
    };

    ws.onclose = () => setTimeout(connectWebSocket, 2000);
    ws.onerror = () => ws.close();
  }

  /* ── KEYBOARD ── */
  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") createDownload();
  });

  loadDownloads();
  connectWebSocket();
</script>
</body>
</html>
