<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Download Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0e18;
  --card: #1c1f2a;
  --card2: #171b26;

  --primary: #4d8eff;
  --primary-soft: #adc6ff;

  --text: #dfe2f1;
  --muted: #7a8094;

  --danger: #ff6b6b;
  --success: #34d399;
  --warning: #fbbf24;
}

body {
  margin: 0;
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* LAYOUT */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: var(--card);
  padding: 30px;
}

.nav-item {
  margin-bottom: 15px;
  cursor: pointer;
  color: var(--muted);
  transition: 0.2s;
}

.nav-item.active {
  color: var(--primary-soft);
}

/* MAIN */
.main {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
}

/* INPUT */
.input-box {
  background: var(--card);
  padding: 20px;
  border-radius: 20px;
  margin-bottom: 30px;
}

input {
  width: 100%;
  padding: 12px;
  background: var(--card2);
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
}

input:focus {
  outline: none;
  border-bottom: 2px solid var(--primary);
}

/* BUTTONS */
button {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.primary {
  margin-top: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-soft));
  color: black;
}

.pause { background: var(--warning); }
.resume { background: var(--success); }
.delete { background: var(--danger); }

/* CARD */
.card {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* PROGRESS */
.progress {
  height: 6px;
  background: #111;
  border-radius: 999px;
  margin-top: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: linear-gradient(135deg, var(--primary), var(--primary-soft));
  transition: width 0.4s ease; /* 🔥 smooth animation */
  width: 0%;
}

/* TEXT */
.small {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}

.status {
  font-size: 12px;
}

.downloading { color: var(--primary-soft); }
.completed { color: var(--success); }
.paused { color: var(--warning); }
.failed { color: var(--danger); }
.cancelled { color: var(--muted); }
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>Downloads</h2>

    <div class="nav-item active" onclick="setFilter(event,'all')">All</div>
    <div class="nav-item" onclick="setFilter(event,'downloading')">Active</div>
    <div class="nav-item" onclick="setFilter(event,'completed')">Finished</div>
    <div class="nav-item" onclick="setFilter(event,'cancelled')">Trash</div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="input-box">
      <input id="urlInput" placeholder="Paste file URL..." />
      <button class="primary" onclick="createDownload()">Add Download</button>
    </div>

    <div id="downloadsContainer"></div>

  </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:8000";
const WS_URL = "ws://127.0.0.1:8000/ws";

const tasks = {};
let currentFilter = "all";

/* 🔥 Smooth rendering */
let renderScheduled = false;

function scheduleRender() {
  if (!renderScheduled) {
    renderScheduled = true;
    requestAnimationFrame(() => {
      render();
      renderScheduled = false;
    });
  }
}

/* Extract filename */
function getFileName(url) {
  try {
    return url.split('/').pop().split('?')[0] || "file";
  } catch {
    return "file";
  }
}

/* RENDER */
function render() {
  const container = document.getElementById("downloadsContainer");

  const filtered = Object.values(tasks).filter(t => {
    if (currentFilter === "all") return true;
    if (currentFilter === "downloading") return t.status === "downloading";
    if (currentFilter === "completed") return t.status === "completed";
    if (currentFilter === "cancelled") return t.status === "cancelled";
    return true;
  });

  container.innerHTML = filtered.map(t => {
    const p = Number(t.progress || 0).toFixed(1);
    const status = (t.status || "").toLowerCase();

    return `
      <div class="card">
        <div class="row">
          <div>
            <div>${getFileName(t.url)}</div>
            <div class="status ${status}">${status}</div>
          </div>

          <div>
            <button class="pause" ${status !== "downloading" ? "disabled" : ""} onclick="pauseDownload('${t.id}')">Pause</button>
            <button class="resume" ${status !== "paused" ? "disabled" : ""} onclick="resumeDownload('${t.id}')">Resume</button>
            <button class="delete" onclick="cancelDownload('${t.id}')">X</button>
          </div>
        </div>

        <div class="progress">
          <div class="fill" style="width:${p}%"></div>
        </div>

        <div class="small">
          ${p}% • ${t.speed || "-"} • ${t.eta || "-"}
        </div>
      </div>
    `;
  }).join("") || `<div class="small">No downloads</div>`;
}

/* FILTER */
function setFilter(e, filter) {
  currentFilter = filter;

  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  e.target.classList.add("active");

  scheduleRender();
}

/* API */
async function createDownload() {
  const url = document.getElementById("urlInput").value;
  if (!url) return alert("Enter URL");

  const res = await fetch(`${API_BASE}/downloads`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ url })
  });

  const task = await res.json();
  tasks[task.id] = task;

  document.getElementById("urlInput").value = "";
  scheduleRender();
}

async function pauseDownload(id) {
  await fetch(`${API_BASE}/downloads/${id}/pause`, { method: "POST" });
}

async function resumeDownload(id) {
  await fetch(`${API_BASE}/downloads/${id}/resume`, { method: "POST" });
}

async function cancelDownload(id) {
  await fetch(`${API_BASE}/downloads/${id}`, { method: "DELETE" });
}

/* WS */
function connectWebSocket() {
  const ws = new WebSocket(WS_URL);

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    tasks[data.id] = { ...tasks[data.id], ...data };
    scheduleRender();
  };

  ws.onclose = () => setTimeout(connectWebSocket, 2000);
}

connectWebSocket();
</script>

</body>
</html>
